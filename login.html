<!DOCTYPE html>
<html lang="zh-CN" style="font-size:40px" data-dpr="1">
<head>
    <meta charset="utf-8">
    <title>登录</title>
    <meta name="keywords" content="学籍在线验证报告,学历在线验证报告,学位在线验证报告,学历证书电子注册备案表,学历验证,学籍验证,学位验证">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="shortcut icon" href="/static/images/ico/favicon_login.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { font-size: 40px; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        body {
            font: 14px/1.8 "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "WenQuanYi Micro Hei", Arial, "SimSun", "sans-serif";
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #fff;
            color: #13161B;
            height: 100vh;
        }
        input:focus { outline: none; }
        input::placeholder { color: #8D949F; }
        input:-webkit-autofill { box-shadow: inset 0 0 0 44px #ffffff!important; }
        a, a:link, a:visited { color: #60656E; text-decoration: none; }
        a:hover { color: #60656E; text-decoration: underline; }
        .login-layout { display: block; height: 100vh; background: #fff; }
        .login-logo {
            width: 100%;
            height: 3.41rem;
            padding: 0 0.74rem;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-logo h1 {
            width: 100%;
            height: 1.28rem;
            font-size: 0;
            background-image: url(img/logo_login_mobile.png);
            background-position: center;
            background-size: contain;
            background-repeat: no-repeat;
        }
        .login-right { padding: 0; display: block; }
        .login-content { width: 100%; padding: 0 0.74rem 0.5rem; box-sizing: border-box; }
        .login-form h3 {
            font-size: 0.37rem;
            line-height: 0.59rem;
            margin-bottom: 0.32rem;
            font-weight: 400;
            color: #8D949F;
            text-align: center;
        }
        .login-form h3 a, .login-form h3 a:hover { color: #60656E; }
        .ct_input { margin: 0 0 0.43rem 0; }
        .input_text {
            box-sizing: border-box;
            width: 100%;
            height: 1.28rem;
            padding: 0.32rem 0.37rem;
            border-radius: 0.11rem;
            font-size: 0.43rem;
            color: #13161B;
            line-height: 1.28rem;
            border: 1px solid #D5D7DB;
            background: #fff;
        }
        .input_text:focus { border-color: #00bac7; }
        .btn_login {
            width: 100%;
            height: 1.28rem;
            background: #00bac7;
            border: 1px solid #00bac7;
            border-radius: 0.11rem;
            color: #fff;
            font-size: 0.43rem;
            cursor: pointer;
            margin-bottom: 0;
        }
        .btn_login:hover { background-color: #09c7d4; border-color: #09c7d4; }
        .btn_login:active { background-color: #00aab6; border-color: #00aab6; }
        .account-oprate {
            width: 100%;
            font-size: 0.37rem;
            margin-top: 0.43rem;
            margin-bottom: 0;
            display: flex;
            justify-content: space-between;
        }
        .find-mm { color: #60656E; font-size: 0.37rem; }
        .regist-btn { color: #60656E; font-size: 0.37rem; }
        .errors {
            margin-bottom: 0.43rem;
            font-size: 0.37rem;
            margin-top: 0.43rem;
            font-weight: 400;
            color: #F93B3B;
            line-height: 0.59rem;
            background: transparent!important;
            word-wrap: break-word;
            display: none;
        }
        .errors.show { display: block; }
        .login-footer-other {
            position: absolute;
            width: 100%;
            bottom: 1.07rem;
            height: 1.44rem;
            box-sizing: border-box;
            text-align: center;
        }
        .login-footer-other a {
            font-size: 0.37rem;
            line-height: 1.44rem;
            margin-right: 0.43rem;
            color: #8D949F;
        }
        .login-footer-other a:last-child { margin-right: 0; }
        .login-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            color: #8d949f;
            font-size: 0.333rem;
            height: 1.07rem;
            line-height: 0.53rem;
            padding: 0.27rem;
            background-color: #f7f8fa;
            text-align: center;
        }
        .login-footer a { color: #8d949f; }
    </style>
</head>
<body style="font-size:12px">
    <div class="login-layout">
        <div class="login-logo">
            <h1><a href="/" target="_blank" class="logo-link">中国高等教育学生信息网（学信网）</a></h1>
        </div>
        <div class="login-right">
            <div class="login-content">
                <div class="login-form">
                    <div class="ncss-stu-title">
                        <h3>请使用 <a href="javascript:void(0)" target="_blank">学信网账号</a> 进行登录</h3>
                    </div>
                    <div class="cr_top">
                        <form id="loginForm">
                            <div class="ct_input">
                                <input id="username" name="username" class="input_text" tabindex="1" type="text" placeholder="" required>
                            </div>
                            <div class="ct_input">
                                <input id="password" name="password" class="input_text" tabindex="2" type="password" placeholder="" required>
                            </div>
                            <div class="errors" id="username-check-tip"></div>
                            <div class="ct_input sub-box">
                                <button class="btn_login" tabindex="4" type="submit">登录</button>
                            </div>
                            <div class="account-oprate">
                                <a class="find-mm" href="javascript:void(0)">找回密码</a>
                                <a href="index.html" class="regist-btn">编辑信息</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="login-footer-other">
            <a href="/">首页</a>
            <a href="javascript:void(0)">帮助中心</a>
            <a href="javascript:void(0)">学信机器人</a>
            <a href="javascript:void(0)">联系我们</a>
        </div>
        <div class="login-footer">
            <div class="login-footer-item">Copyright © 2003-2026 <a href="/">学信网</a> All Rights Reserved</div>
        </div>
    </div>
    <script src="js/api-helper.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorTip = document.getElementById('username-check-tip');
            
            // 清除之前的错误信息
            errorTip.classList.remove('show');
            
            if (!username || !/^1[3-9]\d{9}$/.test(username)) {
                errorTip.textContent = '请输入正确的手机号';
                errorTip.classList.add('show');
                return;
            }
            
            if (!password) {
                errorTip.textContent = '请输入密码';
                errorTip.classList.add('show');
                return;
            }
            
            try {
                // 使用公开 API 进行登录
                const response = await publicApiRequest('/api/user_login', {
                    method: 'POST',
                    body: JSON.stringify({ phone: username, password: password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 保存用户信息和会话令牌
                    localStorage.setItem('user', JSON.stringify(data.data));
                    setSessionToken(data.session_token);
                    
                    // 跳转到学信档案首页
                    window.location.href = 'archive.html';
                } else {
                    errorTip.textContent = data.message || '登录失败';
                    errorTip.classList.add('show');
                }
            } catch (error) {
                console.error('登录错误:', error);
                errorTip.textContent = '网络错误，请稍后重试';
                errorTip.classList.add('show');
            }
        });
    </script>
</body>
</html>
